<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>松山・瀬戸内 旅のしおり</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #FAF6F0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  }

  /* 上部固定タブ */
  .tabbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    background: rgba(250, 246, 240, 0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(61, 48, 39, 0.08);
    box-shadow: 0 2px 16px rgba(61, 48, 39, 0.05);
    padding-top: env(safe-area-inset-top);
    z-index: 100;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    background: none;
    border: none;
    color: #B5A698;
    transition: color 0.25s ease;
    position: relative;
    padding: 0 4px;
  }
  .tab svg {
    width: 21px;
    height: 21px;
    display: block;
  }
  .tab svg path,
  .tab svg circle,
  .tab svg line,
  .tab svg polyline {
    stroke: currentColor;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    transition: stroke 0.25s ease;
  }
  .tab .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .tab.active { color: #8B6552; }
  .tab.active::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 3px;
    border-radius: 3px 3px 0 0;
    background: linear-gradient(90deg, #C19A8B, #D9A0AC);
  }

  /* しおり表示エリア（上部タブの高さ分だけ空ける） */
  .viewport {
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    bottom: 0;
    background: #FAF6F0;
  }
  .viewport iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
  }
  .viewport iframe.active { display: block; }

  /* ローディング表示 */
  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FAF6F0;
    color: #8A7A6E;
    font-size: 14px;
    letter-spacing: 0.05em;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .loader.hidden { opacity: 0; }
</style>
</head>
<body>

<nav class="tabbar">
  <button class="tab active" data-tab="0">
    <!-- 葉：四国・梅雨の新緑/紫陽花 -->
    <svg viewBox="0 0 24 24">
      <path d="M5 19 C5 11, 11 5, 19 5 C19 13, 13 19, 5 19 Z"/>
      <path d="M5 19 C9 15, 13 11, 17 7"/>
    </svg>
    <span class="label">松山</span>
  </button>
  <button class="tab" data-tab="1">
    <!-- 波：高知・仁淀ブルー -->
    <svg viewBox="0 0 24 24">
      <path d="M3 9 C5 6, 7 6, 9 9 C11 12, 13 12, 15 9 C17 6, 19 6, 21 9"/>
      <path d="M3 15 C5 12, 7 12, 9 15 C11 18, 13 18, 15 15 C17 12, 19 12, 21 15"/>
    </svg>
    <span class="label">高知</span>
  </button>
  <button class="tab" data-tab="2">
    <!-- オリーブ：小豆島 -->
    <svg viewBox="0 0 24 24">
      <path d="M12 21 C12 14, 12 9, 12 5"/>
      <path d="M12 12 C9 12, 6 10, 6 6 C10 6, 12 8, 12 12 Z"/>
      <path d="M12 16 C15 16, 18 14, 18 10 C14 10, 12 12, 12 16 Z"/>
      <circle cx="12" cy="4" r="2"/>
    </svg>
    <span class="label">小豆島</span>
  </button>
</nav>

<div class="viewport">
  <div class="loader" id="loader">しおりを読み込んでいます…</div>
  <iframe class="active" data-tab="0" src="shikoku_shiori.html" title="四国 梅雨の女子旅しおり"></iframe>
  <iframe data-tab="1" src="shikoku_shiori_kochi.html" title="高知 仁淀ブルー & 食の旅" loading="lazy"></iframe>
  <iframe data-tab="2" src="shikoku_shiori_shodoshima.html" title="瀬戸内 アート & オリーブ Trip" loading="lazy"></iframe>
</div>

<script>
  var tabs = document.querySelectorAll('.tab');
  var frames = document.querySelectorAll('.viewport iframe');
  var loader = document.getElementById('loader');

  tabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      var idx = tab.getAttribute('data-tab');
      tabs.forEach(function (t) { t.classList.remove('active'); });
      frames.forEach(function (f) { f.classList.remove('active'); });
      tab.classList.add('active');
      document.querySelector('.viewport iframe[data-tab="' + idx + '"]').classList.add('active');
    });
  });

  var first = document.querySelector('.viewport iframe[data-tab="0"]');
  if (first.contentDocument && first.contentDocument.readyState === 'complete') {
    loader.classList.add('hidden');
  } else {
    first.addEventListener('load', function () { loader.classList.add('hidden'); });
  }
  setTimeout(function () { loader.classList.add('hidden'); }, 3000);
</script>

</body>
</html>
